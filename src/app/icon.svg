<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A" />
      <stop offset="1" stop-color="#18233A" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B89166" />
      <stop offset="1" stop-color="#A67C52" />
    </linearGradient>
  </defs>

  <!-- Premium dark card -->
  <rect width="256" height="256" rx="64" fill="url(#bg)" />

  <!-- Subtle blueprint grid -->
  <g opacity="0.08" stroke="#FAFAFA" stroke-width="2">
    <path d="M32 76H224" />
    <path d="M32 124H224" />
    <path d="M32 172H224" />
    <path d="M76 32V224" />
    <path d="M124 32V224" />
    <path d="M172 32V224" />
  </g>

  <!-- Minimal architectural mark: arch + columns -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Arch outline -->
    <path
      d="M82 164v-18c0-25.8 20.9-46.7 46.7-46.7S175.4 120.2 175.4 146v18"
      stroke="#FAFAFA"
      stroke-opacity="0.92"
      stroke-width="12"
    />
    <!-- Columns -->
    <path d="M92 174v-48" stroke="url(#accent)" stroke-width="10" />
    <path d="M128 182v-62" stroke="url(#accent)" stroke-width="10" />
    <path d="M164 174v-48" stroke="url(#accent)" stroke-width="10" />
    <!-- Base line -->
    <path d="M80 188h96" stroke="#FAFAFA" stroke-opacity="0.55" stroke-width="10" />
  </g>
</svg>

